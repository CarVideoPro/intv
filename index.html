<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Car Video Pro - Tam Ekran TV Arayüzü</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        
        .channel-item { transition: all 0.1s ease; }
        .channel-item.active { background: rgba(59, 130, 246, 0.2); border-left-color: #3b82f6; }
        
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
        }
        .video-container iframe, .video-container video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-gray-100 h-screen flex flex-row font-sans overflow-hidden select-none">

    <aside class="w-[140px] sm:w-[180px] md:w-[220px] lg:w-[250px] flex flex-col bg-gray-950 border-r border-gray-900 relative overflow-hidden flex-shrink-0 z-30 h-full shadow-[5px_0_15px_rgba(0,0,0,0.5)]">
        
        <div id="panel-countries" class="absolute inset-0 flex flex-col transition-transform duration-300 transform translate-x-0 bg-gray-950">
            <div class="p-3 border-b border-gray-900 bg-gray-950 sticky top-0 shadow-sm z-10">
                <h2 class="text-[10px] md:text-xs font-bold text-gray-500 uppercase tracking-widest flex items-center gap-2">
                    <i class="fa-solid fa-earth-americas text-blue-500 text-sm"></i> Ülkeler
                </h2>
            </div>
            <div id="country-list" class="flex-1 overflow-y-auto p-1.5 space-y-px"></div>
        </div>

        <div id="panel-channels" class="absolute inset-0 flex flex-col transition-transform duration-300 transform translate-x-full bg-gray-950">
            <div class="p-2 border-b border-gray-900 bg-gray-950 flex items-center justify-between sticky top-0 z-30 shadow-sm">
                <button onclick="showCountriesPanel()" class="text-gray-400 hover:text-white flex items-center gap-1.5 transition-colors text-[10px] md:text-xs font-bold bg-[#111111] px-2 py-1.5 rounded border border-gray-800">
                    <i class="fa-solid fa-chevron-left"></i> Geri
                </button>
                <h2 id="channel-panel-title" class="text-[10px] md:text-xs font-bold text-blue-500 uppercase tracking-widest truncate max-w-[70px] md:max-w-[100px] text-right">Ülke</h2>
            </div>
            <div class="p-2 border-b border-gray-900 bg-gray-950 z-20">
                <div class="relative">
                    <input type="text" id="channel-search" placeholder="Kanal ara..." class="w-full bg-[#111111] text-[10px] md:text-xs text-white rounded pl-6 pr-2 py-1.5 outline-none focus:ring-1 focus:ring-blue-500 border border-gray-800">
                    <i class="fa-solid fa-search absolute left-2 top-2.5 text-gray-500 text-[10px]"></i>
                </div>
            </div>
            <div id="channel-list" class="flex-1 overflow-y-auto p-1.5 space-y-px"></div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full relative z-10 overflow-hidden bg-black">
        
        <header class="bg-gray-950 border-b border-gray-900 shadow-md z-20 flex justify-start items-center gap-3 md:gap-5 px-4 py-2.5 flex-shrink-0">
            
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-1.5 md:p-2 rounded shadow-sm flex-shrink-0">
                <i class="fa-solid fa-car-side text-sm md:text-base"></i>
            </div>
            
            <h1 class="text-xs md:text-lg lg:text-xl font-black tracking-widest text-white uppercase leading-none flex-shrink-0">
                Car Video <span class="text-blue-500">Pro</span>
            </h1>

            <a href="https://t.me/car_video_pro" target="_blank" class="flex items-center gap-1.5 bg-[#0088cc] hover:bg-[#0077b5] text-white px-3 py-1.5 rounded transition-colors text-[9px] md:text-xs font-bold uppercase tracking-wide shadow-lg whitespace-nowrap flex-shrink-0 ml-2 md:ml-4">
                <i class="fa-brands fa-telegram text-sm md:text-base"></i>
                <span class="hidden sm:inline">İletişim: t.me/car_video_pro</span>
                <span class="inline sm:hidden">t.me/car_video_pro</span>
            </a>
            
        </header>

        <main class="flex-1 flex flex-col relative overflow-hidden">
            <div class="flex-1 w-full h-full relative">
                <div class="video-container">
                    <video id="hls-player" class="hidden" controls playsinline></video>
                    <iframe id="yt-player" class="hidden" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    
                    <div id="player-poster" class="absolute inset-0 bg-[#0a0a0a] flex flex-col items-center justify-center z-10">
                        <i class="fa-solid fa-satellite-dish text-4xl md:text-6xl text-gray-800 animate-pulse mb-4"></i>
                        <h2 class="text-sm md:text-lg font-bold text-gray-600 uppercase tracking-widest">Yayın Bekleniyor</h2>
                    </div>
                    
                    <div id="loading-overlay" class="absolute inset-0 bg-black/95 flex flex-col items-center justify-center hidden z-20">
                        <i class="fa-solid fa-circle-notch fa-spin text-4xl md:text-5xl text-blue-500 mb-3"></i>
                        <span class="text-blue-500 font-bold tracking-widest uppercase text-[10px] md:text-xs">Sinyal Alınıyor...</span>
                    </div>
                </div>
            </div>

            <div id="now-playing-bar" class="w-full bg-gray-950 border-t border-gray-900 px-4 py-2 flex items-center gap-3 flex-shrink-0 hidden opacity-0 transition-opacity duration-300">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-white/5 rounded flex-shrink-0 flex items-center justify-center p-0.5">
                    <img id="now-playing-logo" src="" alt="" class="max-w-full max-h-full object-contain rounded-sm">
                </div>
                <div class="flex-1 min-w-0 flex items-center gap-3">
                    <div class="flex items-center gap-1.5">
                        <span class="bg-red-600 text-white text-[9px] md:text-[10px] font-bold px-1.5 py-0.5 rounded uppercase flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 bg-white rounded-full animate-ping"></span> Canlı
                        </span>
                        <span id="now-playing-category" class="text-[9px] md:text-[10px] text-blue-400 font-medium uppercase tracking-wider truncate"></span>
                    </div>
                    <h2 id="now-playing-name" class="text-xs md:text-sm font-bold text-white truncate">Kanal Adı</h2>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE_URL = "https://raw.githubusercontent.com/famelack/famelack-data/refs/heads/main/tv/raw/countries/";
        
        // ÜLKELER LİSTESİ

"🇲🇳"},{code:"me",name:"Montenegro",flag:"🇲🇪"},{code:"ma",name:"Morocco",flag:"🇲🇦"},{code:"mz",name:"Mozambique",flag:"🇲🇿"},{code:"mm",name:"Myanmar",flag:"🇲🇲"},{code:"na",name:"Namibia",flag:"🇳🇦"},{code:"np",name:"Nepal",flag:"🇳🇵"},{code:"nl",name:"Netherlands",flag:"🇳🇱"},{code:"nz",name:"New Zealand",flag:"🇳🇿"},{code:"ni",name:"Nicaragua",flag:"🇳🇮"},{code:"ne",name:"Niger",flag:"🇳🇪"},{code:"ng",name:"Nigeria",flag:"🇳🇬"},{code:"no",name:"Norway",flag:"🇳🇴"},{code:"om",name:"Oman",flag:"🇴🇲"},{code:"pk",name:"Pakistan",flag:"🇵🇰"},{code:"ps",name:"Palestine",flag:"🇵🇸"},{code:"pa",name:"Panama",flag:"🇵🇦"},{code:"pg",name:"Papua New Guinea",flag:"🇵🇬"},{code:"py",name:"Paraguay",flag:"🇵🇾"},{code:"pe",name:"Peru",flag:"🇵🇪"},{code:"ph",name:"Philippines",flag:"🇵🇭"},{code:"pl",name:"Poland",flag:"🇵🇱"},{code:"pt",name:"Portugal",flag:"🇵🇹"},{code:"pr",name:"Puerto Rico",flag:"🇵🇷"},{code:"qa",name:"Qatar",flag:"🇶🇦"},{code:"ro",name:"Romania",flag:"🇷🇴"},{code:"ru",name:"Russia",flag:"🇷🇺"},{code:"rw",name:"Rwanda",flag:"🇷🇼"},{code:"kn",name:"Saint Kitts",flag:"🇰🇳"},{code:"lc",name:"Saint Lucia",flag:"🇱🇨"},{code:"ws",name:"Samoa",flag:"🇼🇸"},{code:"sm",name:"San Marino",flag:"🇸🇲"},{code:"sa",name:"Saudi Arabia",flag:"🇸🇦"},{code:"sn",name:"Senegal",flag:"🇸🇳"},{code:"rs",name:"Serbia",flag:"🇷🇸"},{code:"sc",name:"Seychelles",flag:"🇸🇨"},{code:"sl",name:"Sierra Leone",flag:"🇸🇱"},{code:"sg",name:"Singapore",flag:"🇸🇬"},{code:"sk",name:"Slovakia",flag:"🇸🇰"},{code:"si",name:"Slovenia",flag:"🇸🇮"},{code:"so",name:"Somalia",flag:"🇸🇴"},{code:"za",name:"South Africa",flag:"🇿🇦"},{code:"es",name:"Spain",flag:"🇪🇸"},{code:"lk",name:"Sri Lanka",flag:"🇱🇰"},{code:"sd",name:"Sudan",flag:"🇸🇩"},{code:"sr",name:"Suriname",flag:"🇸🇷"},{code:"se",name:"Sweden",flag:"🇸🇪"},{code:"ch",name:"Switzerland",flag:"🇨🇭"},{code:"sy",name:"Syria",flag:"🇸🇾"},{code:"tw",name:"Taiwan",flag:"🇹🇼"},{code:"tj",name:"Tajikistan",flag:"🇹🇯"},{code:"tz",name:"Tanzania",flag:"🇹🇿"},{code:"th",name:"Thailand",flag:"🇹🇭"},{code:"tl",name:"Timor-Leste",flag:"🇹🇱"},{code:"tg",name:"Togo",flag:"🇹🇬"},{code:"to",name:"Tonga",flag:"🇹🇴"},{code:"tt",name:"Trinidad & Tobago",flag:"🇹🇹"},{code:"tn",name:"Tunisia",flag:"🇹🇳"},{code:"tm",name:"Turkmenistan",flag:"🇹🇲"},{code:"ug",name:"Uganda",flag:"🇺🇬"},{code:"ua",name:"Ukraine",flag:"🇺🇦"},{code:"ae",name:"UAE",flag:"🇦🇪"},{code:"uk",name:"United Kingdom",flag:"🇬🇧"},{code:"us",name:"USA",flag:"🇺🇸"},{code:"uy",name:"Uruguay",flag:"🇺🇾"},{code:"uz",name:"Uzbekistan",flag:"🇺🇿"},{code:"vu",name:"Vanuatu",flag:"🇻🇺"},{code:"ve",name:"Venezuela",flag:"🇻🇪"},{code:"vn",name:"Vietnam",flag:"🇻🇳"},{code:"ye",name:"Yemen",flag:"🇾🇪"},{code:"zm",name:"Zambia",flag:"🇿🇲"},{code:"zw",name:"Zimbabwe",flag:"🇿🇼"}
        ];

        let hls = null;
        let currentChannels = [];
        const panelCountries = document.getElementById('panel-countries');
        const panelChannels = document.getElementById('panel-channels');
        const hlsPlayer = document.getElementById('hls-player');
        const ytPlayer = document.getElementById('yt-player');
        const playerPoster = document.getElementById('player-poster');
        const loadingOverlay = document.getElementById('loading-overlay');
        const searchInput = document.getElementById('channel-search');

        function showChannelsPanel(countryName) {
            document.getElementById('channel-panel-title').textContent = countryName;
            panelCountries.classList.replace('translate-x-0', '-translate-x-full');
            panelChannels.classList.replace('translate-x-full', 'translate-x-0');
            searchInput.value = ''; 
        }

        function showCountriesPanel() {
            panelChannels.classList.replace('translate-x-0', 'translate-x-full');
            panelCountries.classList.replace('-translate-x-full', 'translate-x-0');
        }

        function renderCountries() {
            const list = document.getElementById('country-list');
            countries.forEach(country => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left px-2 md:px-3 py-2 rounded text-gray-400 hover:bg-[#111111] transition-colors flex items-center gap-2 md:gap-3 border-l-[3px] border-transparent hover:border-gray-600 active:bg-gray-800 group";
                btn.innerHTML = `<span class="text-xl md:text-2xl">${country.flag}</span><span class="font-bold text-[10px] md:text-xs tracking-wide group-hover:text-white truncate">${country.name}</span><i class="fa-solid fa-chevron-right ml-auto text-gray-800 group-hover:text-blue-500 text-[8px] md:text-[10px]"></i>`;
                btn.onclick = () => fetchChannels(country.code, country.name);
                list.appendChild(btn);
            });
        }

        async function fetchChannels(code, countryName) {
            const list = document.getElementById('channel-list');
            list.innerHTML = `<div class="p-6 text-center text-blue-500"><i class="fa-solid fa-circle-notch fa-spin text-2xl mb-2"></i></div>`;
            showChannelsPanel(countryName);
            try {
                const response = await fetch(`${API_BASE_URL}${code}.json`);
                const data = await response.json();
                currentChannels = (Array.isArray(data) ? data : []).map(item => ({
                    url: (item.youtube_urls?.[0] || item.stream_urls?.[0] || ""),
                    name: (item.name || "İsimsiz"),
                    logo: (item.logo || ""),
                    category: (item.languages?.[0] || "GENEL")
                })).filter(i => i.url);
                renderChannels(currentChannels);
            } catch (error) {
                list.innerHTML = `<div class="p-6 text-center text-red-500 text-xs font-bold">Liste alınamadı!</div>`;
            }
        }

        function renderChannels(channels) {
            const list = document.getElementById('channel-list');
            list.innerHTML = channels.length ? '' : `<div class="p-6 text-center text-gray-500 text-[10px] font-bold">Kanal Yok</div>`;
            channels.forEach(channel => {
                const btn = document.createElement('button');
                btn.className = "channel-item w-full flex items-center gap-2 md:gap-3 p-2 rounded border-l-[3px] border-transparent text-left group hover:bg-[#111111]";
                btn.innerHTML = `<div class="w-8 h-8 md:w-10 md:h-10 bg-white/5 rounded flex-shrink-0 flex items-center justify-center p-0.5"><img src="${channel.logo || 'https://ui-avatars.com/api/?name='+channel.name}" class="max-w-full max-h-full object-contain"></div><div class="flex-1 min-w-0"><div class="text-[10px] md:text-xs font-bold text-gray-300 truncate group-hover:text-white leading-tight">${channel.name}</div><div class="text-[8px] md:text-[9px] text-gray-600 uppercase truncate mt-0.5">${channel.category}</div></div>`;
                btn.onclick = () => {
                    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
                    btn.classList.add('active');
                    playStream(channel.url, channel.name, channel.logo, channel.category);
                };
                list.appendChild(btn);
            });
        }

        searchInput.addEventListener('input', e => {
            const term = e.target.value.toLowerCase();
            renderChannels(currentChannels.filter(c => c.name.toLowerCase().includes(term)));
        });

        function playStream(url, name, logo, category) {
            playerPoster.classList.add('hidden');
            loadingOverlay.classList.remove('hidden');
            document.getElementById('now-playing-bar').classList.remove('hidden');
            document.getElementById('now-playing-name').textContent = name;
            document.getElementById('now-playing-category').textContent = category;
            document.getElementById('now-playing-logo').src = logo || 'https://ui-avatars.com/api/?name='+name;
            setTimeout(() => document.getElementById('now-playing-bar').classList.remove('opacity-0'), 50);

            if (hls) hls.destroy();
            hlsPlayer.pause(); hlsPlayer.removeAttribute('src'); hlsPlayer.load();
            ytPlayer.src = '';

            const ytID = url.match(/^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/)?.[7];
            if (ytID && ytID.length === 11) {
                hlsPlayer.classList.add('hidden'); ytPlayer.classList.remove('hidden');
                ytPlayer.src = `https://www.youtube-nocookie.com/embed/${ytID}?autoplay=1&modestbranding=1&rel=0`;
                setTimeout(() => loadingOverlay.classList.add('hidden'), 1000);
            } else {
                ytPlayer.classList.add('hidden'); hlsPlayer.classList.remove('hidden');
                if (Hls.isSupported()) {
                    hls = new Hls(); hls.loadSource(url); hls.attachMedia(hlsPlayer);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => { loadingOverlay.classList.add('hidden'); hlsPlayer.play(); });
                } else {
                    hlsPlayer.src = url; hlsPlayer.addEventListener('loadedmetadata', () => { loadingOverlay.classList.add('hidden'); hlsPlayer.play(); });
                }
            }
        }
        document.addEventListener('DOMContentLoaded', renderCountries);
    </script>
</body>
</html>
